name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t construction-genai .

      # 3. Login to DockerHub
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. Tag image
      - name: Tag image
        run: docker tag construction-genai ${{ secrets.DOCKER_USERNAME }}/construction-genai

      # 5. Push image
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/construction-genai

      # 6. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/construction-genai
            docker rm -f construction-genai || true
            docker run -d \
              -p 8501:8501 \
              --name construction-genai \
              --restart unless-stopped \
              -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/construction-genai